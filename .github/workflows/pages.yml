name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stage site
        run: |
          mkdir -p _site
          cp -r web/. _site/
          mkdir -p _site/engines/brzozowski
          cp engines/__init__.py _site/engines/
          cp engines/brzozowski/__init__.py _site/engines/brzozowski/
          cp engines/brzozowski/re_ast.py _site/engines/brzozowski/
          cp engines/brzozowski/parser.py _site/engines/brzozowski/
          cp engines/brzozowski/pretty.py _site/engines/brzozowski/
          cp engines/brzozowski/dfa.py _site/engines/brzozowski/

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
